<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club M Brasil</title>
  <script>
    function getParam(name) {
      const url = new URLSearchParams(window.location.search);
      return url.get(name);
    }

    function limparNumero(numero) {
      return numero.replace(/\D/g, '');
    }

    window.onload = function () {
      let numero = getParam('tel');
      const nome = getParam('nome');
      const primeiro_nome = nome ? nome.split(' ')[0] : '';

      const texto = "Oi, " + primeiro_nome + "! Tudo bem aí? Como você sabe, eu sou membro do Club M Floripa, um clube privado para empresários. Funciona como uma mesa de conselho mesmo, reuniões para discutir desafios, oportunidades fora do mercado e conversas bem construtivas. O nível é bem alto mesmo. Te indiquei para conhecer o clube. Como meu recomendado você tem prioridade na fila de espera. Eles vão te chamar em breve. Fica de olho!";

      if (numero) {
        numero = limparNumero(numero);
        if (!numero.startsWith('55')) {
          numero = '55' + numero;
        }
        const link = 'https://wa.me/' + numero + '?text=' + encodeURIComponent(texto);
        window.location.href = link;
      } else {
        document.getElementById('erro').style.display = 'block';
      }
    };
  </script>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #063A1D;
      font-family: Georgia, serif;
      color: #fff;
      text-align: center;
    }
    .container { padding: 2rem; }
    .logo {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 1rem;
    }
    .msg { font-size: 1.1rem; opacity: 0.85; }
    #erro {
      display: none;
      color: #ffcccc;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Club M Brasil</div>
    <div class="msg">Abrindo WhatsApp...</div>
    <div id="erro">Número não encontrado. Verifique o link.</div>
  </div>
</body>
</html>
